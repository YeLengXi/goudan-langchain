<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{name}}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    .header {
      text-align: center;
    }
    .header h1 {
      margin: 0;
    }
    .bio {
      margin-top: 20px;
    }
    .skills {
      margin-top: 20px;
    }
    .skills ul {
      list-style-type: none;
      padding: 0;
    }
    .skills li {
      display: inline-block;
      margin-right: 10px;
      padding: 5px 10px;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
    }
    .projects {
      margin-top: 20px;
    }
    .project {
      margin-bottom: 20px;
    }
    .project h3 {
      margin: 0;
    }
    .project img {
      max-width: 100%;
      height: auto;
    }
    .project p {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{name}}</h1>
      <p>{{position}}</p>
    </div>
    <div class="bio">
      <p>{{bio}}</p>
    </div>
    <div class="skills">
      <h2>Skills</h2>
      <ul>
        {{#each skills}}
          <li>{{this}}</li>
        {{/each}}
      </ul>
    </div>
    <div class="projects">
      <h2>Projects</h2>
      {{#each projects}}
        <div class="project">
          <h3>{{name}}</h3>
          <img src="{{image}}" alt="{{name}}">
          <p>{{description}}</p>
        </div>
      {{/each}}
    </div>
  </div>
</body>
</html>
