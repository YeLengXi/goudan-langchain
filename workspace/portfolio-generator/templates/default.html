<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    .container {
      width: 80%;
      margin: auto;
      overflow: hidden;
    }
    header {
      background: #35424a;
      color: #ffffff;
      padding-top: 30px;
      min-height: 70px;
      border-bottom: #e8491d 3px solid;
    }
    header a {
      color: #ffffff;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 16px;
    }
    header ul {
      padding: 0;
      list-style: none;
    }
    header li {
      float: left;
      display: inline;
      padding: 0 20px 0 20px;
    }
    header #branding {
      float: left;
    }
    header #branding h1 {
      margin: 0;
    }
    header nav {
      float: right;
      margin-top: 10px;
    }
    header .highlight, header .current a {
      color: #e8491d;
      font-weight: bold;
    }
    header a:hover {
      color: #ffffff;
      font-weight: bold;
    }
    .banner {
      background: url('banner.jpg') no-repeat center center/cover;
      height: 400px;
      background-color: #35424a;
    }
    .banner h1 {
      text-align: center;
      padding-top: 100px;
      color: #ffffff;
      font-size: 55px;
    }
    .banner h3 {
      text-align: center;
      color: #ffffff;
      font-size: 30px;
    }
    footer {
      padding: 20px;
      color: #ffffff;
      background-color: #35424a;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div id="branding">
        <h1><span class="highlight">John</span> Doe</h1>
      </div>
      <nav>
        <ul>
          <li class="current"><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Skills</a></li>
          <li><a href="#">Portfolio</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <section class="banner">
    <div class="container">
      <h1>Welcome to My Portfolio</h1>
      <h3>I am a frontend developer with 5 years of experience.</h3>
    </div>
  </section>
  <footer>
    <p>John Doe &copy; 2022</p>
  </footer>
</body>
</html>
