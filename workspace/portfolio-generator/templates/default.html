<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }
        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{name}}</h1>
            <p>{{position}}</p>
        </div>
        <div>
            <h2>About</h2>
            <p>{{bio}}</p>
        </div>
        <div>
            <h2>Skills</h2>
            <ul>
                {{#each skills}}
                    <li>{{this}}</li>
                {{/each}}
            </ul>
        </div>
        <div>
            <h2>Projects</h2>
            <ul>
                {{#each projects}}
                    <li>{{name}} - {{description}}</li>
                {{/each}}
            </ul>
        </div>
        <div>
            <h2>Social Links</h2>
            <ul>
                {{#each social_links}}
                    <li><a href="{{this}}">{{this}}</a></li>
                {{/each}}
            </ul>
        </div>
    </div>
</body>
</html>
