<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    /* Add your custom styles here */
  </style>
</head>
<body>
  <header>
    <h1>{{name}}</h1>
    <h2>{{position}}</h2>
  </header>
  <section>
    <h2>Bio</h2>
    <p>{{bio}}</p>
  </section>
  <section>
    <h2>Skills</h2>
    <ul>
      {{#each skills}}
        <li>{{this}}</li>
      {{/each}}
    </ul>
  </section>
  <section>
    <h2>Projects</h2>
    <ul>
      {{#each projects}}
        <li>
          <h3>{{name}}</h3>
          <p>{{description}}</p>
          <a href="{{link}}">View Project</a>
        </li>
      {{/each}}
    </ul>
  </section>
  <section>
    <h2>Contacts</h2>
    <ul>
      {{#each social_links}}
        <li>
          <a href="{{this}}">{{this}}</a>
        </li>
      {{/each}}
    </ul>
  </section>
</body>
</html>
