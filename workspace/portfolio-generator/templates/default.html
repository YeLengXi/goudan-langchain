<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{name}}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: {{theme_color}};
    }
  </style>
</head>
<body>
  <h1>{{name}}</h1>
  <h2>{{position}}</h2>
  <p>{{bio}}</p>
  <ul>
    {{#skills}}
      <li>{{.}}</li>
    {{/skills}}
  </ul>
  <h2>Projects</h2>
  <ul>
    {{#projects}}
      <li>{{name}} - {{description}}</li>
    {{/projects}}
  </ul>
  <h2>Social Links</h2>
  <ul>
    {{#social_links}}
      <li><a href="{{url}}" target="_blank">{{name}}</a></li>
    {{/social_links}}
  </ul>
</body>
</html>
