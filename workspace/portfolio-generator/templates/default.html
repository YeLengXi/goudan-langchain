<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    header {
      background-color: #333;
      color: #fff;
      padding: 10px 0;
      text-align: center;
    }
    header h1 {
      margin: 0;
    }
    header p {
      margin: 0;
    }
    .bio {
      background-color: #fff;
      padding: 20px;
      margin-top: 20px;
    }
    .bio h2 {
      margin-top: 0;
    }
    .skills {
      background-color: #fff;
      padding: 20px;
      margin-top: 20px;
    }
    .skills h2 {
      margin-top: 0;
    }
    .projects {
      background-color: #fff;
      padding: 20px;
      margin-top: 20px;
    }
    .projects h2 {
      margin-top: 0;
    }
    .project {
      margin-bottom: 20px;
    }
    .project h3 {
      margin-top: 0;
    }
    .project p {
      margin-top: 0;
    }
    .social-links {
      background-color: #fff;
      padding: 20px;
      margin-top: 20px;
    }
    .social-links a {
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>{{name}}</h1>
      <p>{{position}}</p>
    </header>
    <section class="bio">
      <h2>About Me</h2>
      <p>{{bio}}</p>
    </section>
    <section class="skills">
      <h2>Skills</h2>
      <ul>
        {{#each skills}}
          <li>{{this}}</li>
        {{/each}}
      </ul>
    </section>
    <section class="projects">
      <h2>Projects</h2>
      {{#each projects}}
        <div class="project">
          <h3>{{name}}</h3>
          <p>{{description}}</p>
          <a href="{{url}}" target="_blank">View Project</a>
        </div>
      {{/each}}
    </section>
    <section class="social-links">
      <h2>Connect</h2>
      <a href="{{social_links.GitHub}}" target="_blank">GitHub</a>
      <a href="{{social_links.LinkedIn}}" target="_blank">LinkedIn</a>
      <a href="{{social_links.Email}}" target="_blank">Email</a>
    </section>
  </div>
</body>
</html>
