<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{name}}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    .header {
      text-align: center;
    }
    .skills {
      margin-top: 20px;
    }
    .project {
      margin-top: 20px;
      border: 1px solid #ddd;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{name}}</h1>
      <h2>{{position}}</h2>
    </div>
    <div class="bio">
      {{bio}}
    </div>
    <div class="skills">
      <h3>Skills</h3>
      <p>{{skills}}</p>
    </div>
    <div class="projects">
      <h3>Projects</h3>
      {{projects}}
    </div>
  </div>
</body>
</html>
