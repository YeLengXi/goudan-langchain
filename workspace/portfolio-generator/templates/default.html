<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    .header {
      text-align: center;
    }
    .header h1 {
      margin: 0;
    }
    .header p {
      margin: 0;
    }
    .skills {
      margin-top: 20px;
    }
    .skills h2 {
      margin: 0;
    }
    .skills ul {
      list-style: none;
      padding: 0;
    }
    .skills li {
      margin-bottom: 10px;
    }
    .projects {
      margin-top: 20px;
    }
    .projects h2 {
      margin: 0;
    }
    .projects ul {
      list-style: none;
      padding: 0;
    }
    .projects li {
      margin-bottom: 10px;
    }
    .social-links {
      margin-top: 20px;
    }
    .social-links a {
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{ name }}</h1>
      <p>{{ position }}</p>
    </div>
    <div class="bio">
      <p>{{ bio }}</p>
    </div>
    <div class="skills">
      <h2>Skills</h2>
      <ul>
        {{#each skills}}
          <li>{{ this }}</li>
        {{/each}}
      </ul>
    </div>
    <div class="projects">
      <h2>Projects</h2>
      <ul>
        {{#each projects}}
          <li>
            <h3>{{ name }}</h3>
            <p>{{ description }}</p>
            <a href="{{ link }}">View Project</a>
          </li>
        {{/each}}
      </ul>
    </div>
    <div class="social-links">
      <h2>Connect</h2>
      <a href="{{ social_links.GitHub }}">GitHub</a>
      <a href="{{ social_links.LinkedIn }}">LinkedIn</a>
      <a href="{{ social_links.Email }}">Email</a>
    </div>
  </div>
</body>
</html>
