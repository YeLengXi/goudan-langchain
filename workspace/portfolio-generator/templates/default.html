<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .social-links {
      text-align: center;
      margin-top: 20px;
    }
    .social-links a {
      margin: 0 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>{{ name }}</h1>
    <h2>{{ position }}</h2>
    <p>{{ bio }}</p>
    <h3>Skills</h3>
    <ul>
      {{#each skills}}
        <li>{{ this }}</li>
      {{/each}}
    </ul>
    <h3>Projects</h3>
    <ul>
      {{#each projects}}
        <li><a href="{{ link }}">{{ name }}</a> - {{ description }}</li>
      {{/each}}
    </ul>
    <div class="social-links">
      {{#each social_links}}
        <a href="{{ this }}"><img src="{{& url_for('social_icons', { icon: this }) }}" alt="{{ this }}"></a>
      {{/each}}
    </div>
  </div>
</body>
</html>
