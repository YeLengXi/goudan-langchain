<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    header {
      background-color: #333;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    h1 {
      margin: 0;
    }
    p {
      margin: 0;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>{{name}}</h1>
      <p>{{position}}</p>
    </header>
    <section>
      <h2>About</h2>
      <p>{{bio}}</p>
    </section>
    <section>
      <h2>Skills</h2>
      <ul>
        {{#each skills}}
          <li>{{this}}</li>
        {{/each}}
      </ul>
    </section>
    <section>
      <h2>Projects</h2>
      <ul>
        {{#each projects}}
          <li>
            <h3>{{name}}</h3>
            <p>{{description}}</p>
            <a href="{{link}}">View Project</a>
          </li>
        {{/each}}
      </ul>
    </section>
    <section>
      <h2>Social Links</h2>
      <ul>
        {{#each social_links}}
          <li>
            <a href="{{this}}">{{this}}</a>
          </li>
        {{/each}}
      </ul>
    </section>
  </div>
</body>
</html>
