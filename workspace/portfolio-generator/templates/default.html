<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }
        .header {
            text-align: center;
        }
        .header h1 {
            margin: 0;
        }
        .bio {
            margin-top: 20px;
        }
        .skills {
            margin-top: 20px;
        }
        .skills h2 {
            margin: 0;
        }
        .skills ul {
            list-style-type: none;
            padding: 0;
        }
        .projects {
            margin-top: 20px;
        }
        .projects h2 {
            margin: 0;
        }
        .projects ul {
            list-style-type: none;
            padding: 0;
        }
        .social {
            margin-top: 20px;
        }
        .social a {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{name}}</h1>
            <p>{{position}}</p>
        </div>
        <div class="bio">
            {{bio}}
        </div>
        <div class="skills">
            <h2>Skills</h2>
            <ul>
                {{#skills}}
                    <li>{{.}}</li>
                {{/skills}}
            </ul>
        </div>
        <div class="projects">
            <h2>Projects</h2>
            <ul>
                {{#projects}}
                    <li><a href="{{link}}">{{name}}</a> - {{description}}</li>
                {{/projects}}
            </ul>
        </div>
        <div class="social">
            <h2>Connect</h2>
            <a href="{{GitHub}}">GitHub</a>
            <a href="{{LinkedIn}}">LinkedIn</a>
            <a href="{{Email}}">Email</a>
        </div>
    </div>
</body>
</html>
