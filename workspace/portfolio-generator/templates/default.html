<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    .container {
      width: 80%;
      margin: auto;
      overflow: hidden;
    }

    header {
      background: #50b3a2;
      color: #fff;
      padding-top: 30px;
      min-height: 70px;
      border-bottom: #e8491d 3px solid;
    }

    header a {
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 16px;
    }

    header ul {
      padding: 0;
      list-style: none;
    }

    header li {
      float: left;
      display: inline;
      padding: 0 20px 0 20px;
    }

    header #branding {
      float: left;
    }

    header #branding h1 {
      margin: 0;
    }

    header nav {
      float: right;
      margin-top: 10px;
    }

    header .highlight, header .current a {
      color: #e8491d;
      font-weight: bold;
    }

    header a:hover {
      color: #ffffff;
      font-weight: bold;
    }

    .main-section {
      padding: 20px 0;
    }

    .section-title {
      text-align: center;
      color: #50b3a2;
      font-size: 35px;
      margin-bottom: 30px;
    }

    .section-content {
      text-align: center;
    }

    footer {
      background: #50b3a2;
      color: #fff;
      text-align: center;
      padding: 20px;
      position: relative;
      bottom: 0;
      width: 100%;
    }
  </style>

</head>
<body>

  <header>
    <div class="container">
      <div id="branding">
        <h1><span class="highlight">My</span> Portfolio</h1>
      </div>
      <nav>
        <ul>
          <li class="current"><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Skills</a></li>
          <li><a href="#">Portfolio</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="main-section">
    <div class="container">
      <div class="section-title">Welcome to My Portfolio</div>
      <div class="section-content">
        <p>This is a sample portfolio website.</p>
      </div>
    </div>
  </section>

  <footer>
    <p>My Portfolio &copy; 2023</p>
  </footer>

</body>
</html>
