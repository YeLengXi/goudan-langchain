<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    header {
      background-color: #333;
      color: #fff;
      padding: 10px;
      text-align: center;
    }
    .skills {
      margin-top: 20px;
    }
    .skills ul {
      list-style-type: none;
      padding: 0;
    }
    .skills li {
      display: inline-block;
      margin-right: 10px;
      padding: 5px 10px;
      background-color: #555;
      color: #fff;
      border-radius: 5px;
    }
    .projects {
      margin-top: 20px;
    }
    .project {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>{{name}}</h1>
      <p>{{position}}</p>
    </header>
    <section>
      <h2>About</h2>
      <p>{{bio}}</p>
    </section>
    <section class="skills">
      <h2>Skills</h2>
      <ul>
        {{#each skills}}
          <li>{{this}}</li>
        {{/each}}
      </ul>
    </section>
    <section class="projects">
      <h2>Projects</h2>
      {{#each projects}}
        <div class="project">
          <h3>{{name}}</h3>
          <p>{{description}}</p>
          <a href="{{link}}" target="_blank">View Project</a>
        </div>
      {{/each}}
    </section>
  </div>
</body>
</html>
