<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f4f4f4;
    }

    .container {
      width: 80%;
      margin: auto;
      overflow: hidden;
    }

    header {
      background: #50b3a2;
      color: #fff;
      padding-top: 30px;
      min-height: 70px;
      border-bottom: #e8491d 3px solid;
    }

    header a {
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 16px;
    }

    header ul {
      padding: 0;
      list-style: none;
    }

    header li {
      float: left;
      display: inline;
      padding: 0 20px 0 20px;
    }

    header #branding {
      float: left;
    }

    header #branding h1 {
      margin: 0;
    }

    header nav {
      float: right;
      margin-top: 10px;
    }

    header .highlight, header .current a {
      color: #e8491d;
      font-weight: bold;
    }

    header a:hover {
      color: #ffffff;
      font-weight: bold;
    }

    .profile {
      background: #fff;
      color: #333;
      padding: 20px;
      margin-top: 20px;
    }

    .profile img {
      width: 100%;
      border-radius: 50%;
    }

    .profile h2 {
      margin-top: 10px;
    }

    .profile p {
      margin-top: 5px;
    }

    .skills {
      background: #fff;
      color: #333;
      padding: 20px;
      margin-top: 20px;
    }

    .skills h2 {
      margin-top: 10px;
    }

    .skills ul {
      list-style-type: none;
      padding: 0;
    }

    .skills li {
      background: #f4f4f4;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 5px;
    }

    .projects {
      background: #fff;
      color: #333;
      padding: 20px;
      margin-top: 20px;
    }

    .projects h2 {
      margin-top: 10px;
    }

    .projects ul {
      list-style-type: none;
      padding: 0;
    }

    .projects li {
      background: #f4f4f4;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 5px;
    }

    .footer {
      background: #50b3a2;
      color: #fff;
      text-align: center;
      padding: 10px;
      position: relative;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <div id="branding">
        <h1>{{name}}</h1>
      </div>
      <nav>
        <ul>
          <li class="current"><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Skills</a></li>
          <li><a href="#">Projects</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="profile">
    <div class="container">
      <img src="{{profile_image_url}}" alt="Profile Image">
      <h2>{{name}}</h2>
      <p>{{position}}</p>
      <p>{{bio}}</p>
    </div>
  </section>

  <section class="skills">
    <div class="container">
      <h2>Skills</h2>
      <ul>
        {{#each skills}}
          <li>{{this}}</li>
        {{/each}}
      </ul>
    </div>
  </section>

  <section class="projects">
    <div class="container">
      <h2>Projects</h2>
      <ul>
        {{#each projects}}
          <li>
            <h3>{{name}}</h3>
            <p>{{description}}</p>
            <a href="{{link}}">View Project</a>
          </li>
        {{/each}}
      </ul>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>{{name}} &copy; 2023</p>
    </div>
  </footer>

</body>
</html>
